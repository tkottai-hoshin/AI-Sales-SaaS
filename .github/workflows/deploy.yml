name: Simple Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t gcr.io/${{ vars.GCP_PROJECT_ID }}/my-saas-app:${{ github.sha }} .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Push Docker Image
        run: |
          gcloud auth configure-docker gcr.io
          docker push gcr.io/${{ vars.GCP_PROJECT_ID }}/my-saas-app:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy sales-insights-app \
            --image gcr.io/${{ vars.GCP_PROJECT_ID }}/my-saas-app:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --project ${{ vars.GCP_PROJECT_ID }}
