name: Very Simple Test Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t test-app:${{ github.sha }} .

      - name: Echo Success
        run: echo "✅ Build succeeded! (Authentication skipped for now)"
