steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/my-saas-app:$COMMIT_SHA', '.']

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/my-saas-app:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'sales-insights-app',
           '--image', 'gcr.io/$PROJECT_ID/my-saas-app:$COMMIT_SHA',
           '--region', 'us-central1',
           '--allow-unauthenticated',
           '--platform', 'managed',
           '--project', '$PROJECT_ID']

options:
  logging: CLOUD_LOGGING_ONLY   # ← This fixes the error
